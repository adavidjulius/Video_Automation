name: AI Video Bot

on:
  schedule:
    # Runs daily at 9 AM UTC (change as needed)
    - cron: '0 9 * * *'
  workflow_dispatch:        # Allows manual trigger
    inputs:
      topic:
        description: 'Video topic'
        required: false
        default: 'random'

jobs:
  generate-and-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4          # Updated to v4

      - name: Set up Python
        uses: actions/setup-python@v5      # Updated to v5
        with:
          python-version: '3.13.5'
          cache: 'pip'                      # Speeds up dependency install

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg    # Required for video processing

      - name: Install Python packages
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Determine video topic
        id: topic
        run: |
          if [[ "${{ github.event.inputs.topic }}" == "random" ]] || [[ -z "${{ github.event.inputs.topic }}" ]]; then
            TOPICS=("Python Tips" "AI News" "Tech Facts" "Coding Motivation" "GitHub Actions" "Open Source")
            RANDOM=$$(date +%s)
            SELECTED=${TOPICS[$RANDOM % ${#TOPICS[@]}]}
            echo "selected_topic=$SELECTED" >> $GITHUB_OUTPUT
          else
            echo "selected_topic=${{ github.event.inputs.topic }}" >> $GITHUB_OUTPUT
          fi

      - name: Generate video
        run: python scripts/generate_video.py "${{ steps.topic.outputs.selected_topic }}"

      - name: Upload video as artifact (v4)
        uses: actions/upload-artifact@v4     # ✅ FIXED: v4 is the current version
        with:
          name: generated-video
          path: ./*.mp4
          retention-days: 7                   # Free for 90 days max

      - name: Upload to YouTube (optional)
        if: success() && env.YOUTUBE_EMAIL && env.YOUTUBE_PASS
        env:
          YOUTUBE_EMAIL: ${{ secrets.YOUTUBE_EMAIL }}
          YOUTUBE_PASS: ${{ secrets.YOUTUBE_PASS }}
        run: python scripts/upload_to_youtube.py "${{ steps.topic.outputs.selected_topic }}"
